<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUMBLE Playlist Creator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0a; color: #fff; font-family: sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.card { background: #141414; border: 1px solid #2a2a2a; border-radius: 16px; padding: 40px; max-width: 600px; width: 100%; }
h1 { font-size: 28px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; }
h1 span { color: #1DB954; }
.sub { color: #888; font-size: 14px; margin-bottom: 32px; }
.btn { display: block; width: 100%; padding: 16px; border-radius: 50px; font-size: 16px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border: none; background: #1DB954; color: #000; }
.btn:disabled { background: #555; color: #888; cursor: not-allowed; }
.status { margin-top: 24px; padding: 16px; border-radius: 10px; font-size: 14px; display: none; }
.status.show { display: block; background: #0f1f0f; border: 1px solid #1DB954; color: #1DB954; }
.status.err { display: block; background: #1f0f0f; border: 1px solid #E74C3C; color: #E74C3C; }
.plist { margin-top: 24px; display: flex; flex-direction: column; gap: 10px; }
.pi { padding: 14px 16px; border-radius: 10px; border: 1px solid #2a2a2a; font-size: 14px; display: flex; justify-content: space-between; }
.pi.done { border-color: #1DB954; background: #0f1f0f; }
.nm { font-weight: 700; }
.tr { color: #888; font-size: 12px; }
</style>
</head>
<body>
<div class="card">
  <h1>RUMBLE <span>-</span> Playlists</h1>
  <p class="sub">Creates 5 BPM-sorted Spotify playlists for your workout</p>
  <button id="btn" class="btn" onclick="go()">Connect to Spotify</button>
  <div id="st" class="status"></div>
  <div id="pl" class="plist"></div>
</div>
<script>
const CID='0881a7effda04d1a9b6cb68d78e97bd3';
const RU='https://vikashjasani.github.io/rumble-workout/playlist-creator.html';
const PLS=[
  {name:'RUMBLE - Cool Down',desc:'Mellow, melodic. 70-85 BPM.',tracks:[['Summer Breeze','Isley Brothers'],['The Tracks of My Tears','Smokey Robinson']]},
  {name:'RUMBLE - Warm Up',desc:'Smooth, building. 90-105 BPM.',tracks:[['Used to Love U','John Legend'],['Passin Me By','The Pharcyde'],['T.R.O.Y.','Pete Rock CL Smooth'],['Bonita Applebum','A Tribe Called Quest'],['Award Tour','A Tribe Called Quest'],['Selfish','Slum Village'],['Ya Mama','The Pharcyde'],['Remember the Time','Michael Jackson'],['Buggin Out','A Tribe Called Quest'],['The Seed 2.0','The Roots'],['Hard to Handle','Otis Redding'],['Who Got Da Props','Black Moon'],['Red Hot','Jurassic 5']]},
  {name:'RUMBLE - Bench',desc:'Rhythmic. 110-120 BPM.',tracks:[['Intergalactic','Beastie Boys'],['She Wants to Move','NERD']]},
  {name:'RUMBLE - Bag Work',desc:'Hard, driving. 130-145 BPM.',tracks:[['Sabotage','Beastie Boys']]},
  {name:'RUMBLE - Finisher',desc:'All out. 145-160 BPM.',tracks:[]}
];
function b64(buf){return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/[+]/g,'-').replace(/[/]/g,'_').replace(/=+$/,'');}
function st(msg,err){const e=document.getElementById('st');e.className='status '+(err?'err':'show');e.innerHTML=msg;}
async function login(){
  const a=new Uint8Array(64);crypto.getRandomValues(a);
  const v=b64(a);
  const ch=b64(await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v)));
  sessionStorage.setItem('v',v);
  const p=new URLSearchParams({response_type:'code',client_id:CID,scope:'playlist-modify-public playlist-modify-private',redirect_uri:RU,code_challenge_method:'S256',code_challenge:ch});
  location.href='https://accounts.spotify.com/authorize?'+p;
}
async function exchange(code){
  const r=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({grant_type:'authorization_code',code,redirect_uri:RU,client_id:CID,code_verifier:sessionStorage.getItem('v')})});
  return r.json();
}
async function api(tok,url,opts={}){return fetch(url,{...opts,headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json',...opts.headers}});}
async function run(tok){
  st('Creating playlists...');
  document.getElementById('btn').disabled=true;
  const me=await(await api(tok,'https://api.spotify.com/v1/me')).json();
  const plDiv=document.getElementById('pl');plDiv.innerHTML='';
  for(let i=0;i<PLS.length;i++){
    const pl=PLS[i];
    st('Creating: '+pl.name+' ('+(i+1)+'/'+PLS.length+')');
    const cr=await(await api(tok,'https://api.spotify.com/v1/users/'+me.id+'/playlists',{method:'POST',body:JSON.stringify({name:pl.name,description:pl.desc,public:false})})).json();
    if(!cr.id){const d=document.createElement('div');d.className='pi';d.innerHTML='<div class="nm">'+pl.name+' - ERROR</div>';plDiv.appendChild(d);continue;}
    const uris=[];
    for(const[t,a]of pl.tracks){const s=await(await api(tok,'https://api.spotify.com/v1/search?q='+encodeURIComponent('track:'+t+' artist:'+a)+'&type=track&limit=1')).json();const u=s.tracks?.items?.[0]?.uri;if(u)uris.push(u);}
    if(uris.length)await api(tok,'https://api.spotify.com/v1/playlists/'+cr.id+'/tracks',{method:'POST',body:JSON.stringify({uris})});
    const d=document.createElement('div');d.className='pi done';d.innerHTML='<div><div class="nm">'+pl.name+'</div><div class="tr">'+pl.desc+'</div></div><div style="color:#1DB954">'+uris.length+' tracks</div>';
    plDiv.appendChild(d);
  }
  st('Done! Open Spotify to see your playlists.');
  const b=document.getElementById('btn');b.disabled=false;b.textContent='Open Spotify';b.onclick=()=>window.open('https://open.spotify.com','_blank');
}
async function go(){const t=sessionStorage.getItem('t');if(t)run(t);else login();}
(async()=>{
  const p=new URLSearchParams(location.search);
  const code=p.get('code');const err=p.get('error');
  if(err){st('Auth denied: '+err,true);return;}
  if(code){
    history.replaceState({},'',location.pathname);
    st('Authenticating...');
    document.getElementById('btn').disabled=true;
    const tok=await exchange(code);
    if(tok.access_token){sessionStorage.setItem('t',tok.access_token);document.getElementById('btn').disabled=false;document.getElementById('btn').textContent='Create All Playlists';st('Connected! Click the button to create your 5 RUMBLE playlists.');}
    else{st('Auth failed: '+(tok.error_description||tok.error),true);document.getElementById('btn').disabled=false;}
  }
})();
</script>
</body>
</html>
