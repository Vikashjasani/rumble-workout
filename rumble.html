<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>RUMBLE</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #0a0a0a; color: #fff; font-family: 'Bebas Neue', Impact, sans-serif; overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }
button { font-family: 'Bebas Neue', Impact, sans-serif; cursor: pointer; border: none; outline: none; }
#app { min-height: 100%; }
.view { display: none; min-height: 100vh; padding: 0 18px 60px; max-width: 480px; margin: 0 auto; flex-direction: column; }
.view.active { display: flex; }

/* LOGO */
.logo-area { text-align: center; padding-top: 40px; }
.eyebrow { font-size: 11px; letter-spacing: 6px; color: #ef4444; font-family: monospace; }
.logo { font-size: clamp(56px, 15vw, 80px); letter-spacing: 5px; line-height: 0.88; }
.logo-sub { font-size: 12px; letter-spacing: 3px; color: #555; margin-top: 8px; font-family: monospace; }

/* SPOTIFY BAR */
.spotify-bar { margin-top: 20px; background: #111; border: 1px solid #1e1e1e; border-radius: 14px; padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.spotify-bar.connected { border-color: rgba(30,215,96,0.3); }
.sp-info { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.sp-icon { width: 32px; height: 32px; border-radius: 50%; background: #1DB954; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.sp-text { min-width: 0; }
.sp-label { font-size: 10px; color: #555; letter-spacing: 3px; font-family: monospace; }
.sp-name { font-size: 13px; color: #888; font-family: Georgia, serif; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sp-name.connected { color: #1DB954; }
.btn-sp-connect { padding: 10px 16px; background: #1DB954; border-radius: 8px; color: #000; font-size: 12px; letter-spacing: 2px; flex-shrink: 0; transition: opacity 0.15s; }
.btn-sp-connect:active { opacity: 0.8; }
.btn-sp-disconnect { padding: 10px 14px; background: transparent; border: 1px solid #2a2a2a; border-radius: 8px; color: #555; font-size: 11px; letter-spacing: 2px; flex-shrink: 0; }

/* NOW PLAYING */
.now-playing { margin-top: 10px; background: rgba(29,185,84,0.06); border: 1px solid rgba(29,185,84,0.15); border-radius: 12px; padding: 12px 16px; display: none; align-items: center; gap: 12px; }
.now-playing.show { display: flex; }
.np-bars { display: flex; gap: 3px; align-items: flex-end; height: 16px; }
.np-bar { width: 3px; border-radius: 2px; background: #1DB954; animation: npbar 0.8s ease-in-out infinite alternate; }
.np-bar:nth-child(2) { animation-delay: 0.2s; }
.np-bar:nth-child(3) { animation-delay: 0.4s; }
@keyframes npbar { from { height: 4px; } to { height: 14px; } }
.np-text { flex: 1; min-width: 0; }
.np-track { font-size: 12px; color: #1DB954; font-family: Georgia, serif; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.np-artist { font-size: 10px; color: #555; font-family: monospace; letter-spacing: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* OPTIONS */
.options-card { margin-top: 16px; background: #111; border: 1px solid #222; border-radius: 18px; padding: 22px 18px; position: relative; overflow: hidden; }
.options-card::before { content:''; position:absolute; top:0; left:0; width:100%; height:3px; background: linear-gradient(90deg,#ef4444,#f97316,#3b82f6); }
.options-title { font-size: 11px; color: #555; letter-spacing: 4px; font-family: monospace; margin-bottom: 18px; }
.option-group { margin-bottom: 18px; }
.option-group:last-child { margin-bottom: 0; }
.option-label { font-size: 11px; color: #777; letter-spacing: 3px; font-family: monospace; margin-bottom: 10px; display: block; }
.pill-row { display: flex; gap: 8px; flex-wrap: wrap; }
.pill { padding: 9px 14px; border-radius: 10px; border: 1px solid #2a2a2a; background: transparent; color: #666; font-size: 12px; letter-spacing: 2px; transition: all 0.15s; }
.pill.selected { border-color: #ef4444; background: rgba(239,68,68,0.12); color: #fff; }
.pill:active { transform: scale(0.95); }
.toggle-pill { padding: 9px 14px; border-radius: 10px; border: 1px solid #2a2a2a; background: transparent; color: #666; font-size: 12px; letter-spacing: 2px; transition: all 0.15s; }
.toggle-pill.on { border-color: #f97316; background: rgba(249,115,22,0.12); color: #fff; }

/* SPOTIFY PLAYLIST SETUP */
.sp-playlists-card { margin-top: 14px; background: #111; border: 1px solid #222; border-radius: 14px; padding: 18px; display: none; }
.sp-playlists-card.show { display: block; }
.sp-pl-title { font-size: 11px; color: #1DB954; letter-spacing: 4px; font-family: monospace; margin-bottom: 14px; }
.sp-pl-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.sp-pl-label { font-size: 11px; letter-spacing: 2px; min-width: 70px; flex-shrink: 0; }
.sp-pl-label.bag { color: #ef4444; }
.sp-pl-label.bench { color: #60a5fa; }
.sp-pl-label.warmup { color: #facc15; }
.sp-pl-label.cool { color: #4ade80; }
.sp-pl-label.tread { color: #f97316; }
.sp-pl-select { flex: 1; background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 8px; color: #ccc; padding: 8px 10px; font-family: Georgia, serif; font-size: 12px; appearance: none; -webkit-appearance: none; min-width: 0; }
.sp-pl-select:focus { outline: none; border-color: #1DB954; }

/* BUTTONS */
.btn-generate { width:100%; padding:19px; background:linear-gradient(135deg,#ef4444,#dc2626); border-radius:14px; color:#fff; font-size:21px; letter-spacing:5px; box-shadow:0 8px 32px rgba(239,68,68,0.28); margin-top:14px; transition:transform 0.12s; }
.btn-generate:active { transform:scale(0.97); }
.btn-generate:disabled { background:#1e1e1e; color:#444; box-shadow:none; cursor:not-allowed; }
.btn-start { width:100%; padding:21px; background:linear-gradient(135deg,#ef4444,#dc2626); border-radius:14px; color:#fff; font-size:24px; letter-spacing:6px; box-shadow:0 8px 32px rgba(239,68,68,0.28); margin-top:14px; transition:transform 0.12s; }
.btn-start:active { transform:scale(0.97); }
.btn-outline { width:100%; padding:14px; background:transparent; border:1px solid #2a2a2a; border-radius:12px; color:#888; font-size:13px; letter-spacing:3px; margin-top:10px; }
.btn-outline:active { border-color:#555; color:#ccc; }

/* SUMMARY */
.summary-card { margin-top: 16px; background: #111; border: 1px solid #1e1e1e; border-radius: 14px; padding: 18px; }
.sum-title { font-size: clamp(17px,5vw,21px); letter-spacing: 2px; line-height: 1.2; margin-bottom: 6px; }
.sum-theme { font-size: 13px; color: #888; font-family: Georgia, serif; font-style: italic; }
.sum-tags { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.tag { font-size: 10px; letter-spacing: 2px; padding: 5px 10px; border-radius: 20px; font-family: monospace; }
.tag.red { background: rgba(239,68,68,0.15); color: #ef4444; }
.tag.blue { background: rgba(59,130,246,0.15); color: #60a5fa; }
.tag.orange { background: rgba(249,115,22,0.15); color: #f97316; }
.tag.green { background: rgba(74,222,128,0.15); color: #4ade80; }
.tag.spotify { background: rgba(29,185,84,0.15); color: #1DB954; }

/* OVERVIEW */
.ov-header { display:flex; align-items:center; padding:24px 0 16px; gap:14px; }
.back-btn { background:none; border:none; color:#888; font-size:24px; padding:4px 8px 4px 0; }
.ov-eyebrow { font-size:11px; color:#ef4444; letter-spacing:4px; font-family:monospace; }
.ov-title-txt { font-size:20px; letter-spacing:2px; }
.round-card { background:#111; border-radius:14px; padding:16px; margin-bottom:10px; border:1px solid #1e1e1e; }
.round-card.bag { border-left:3px solid #ef4444; border-color:rgba(239,68,68,0.2); border-left-color:#ef4444; }
.round-card.bench { border-left:3px solid #3b82f6; border-color:rgba(59,130,246,0.2); border-left-color:#3b82f6; }
.round-card.tread { border-left:3px solid #f97316; border-color:rgba(249,115,22,0.2); border-left-color:#f97316; }
.round-card.warmup { border-left:3px solid #facc15; }
.round-card.cool { border-left:3px solid #4ade80; }
.round-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.round-nm { font-size:14px; letter-spacing:2px; }
.badge { font-size:10px; letter-spacing:2px; padding:4px 10px; border-radius:20px; font-family:monospace; }
.badge.bag { background:rgba(239,68,68,0.15); color:#ef4444; }
.badge.bench { background:rgba(59,130,246,0.15); color:#60a5fa; }
.badge.tread { background:rgba(249,115,22,0.15); color:#f97316; }
.combo-line { font-size:12px; color:#f97316; font-family:monospace; margin-bottom:8px; }
.ph-row { display:flex; gap:10px; align-items:flex-start; margin-bottom:6px; }
.ph-t { font-size:10px; color:#555; font-family:monospace; min-width:36px; padding-top:2px; }
.ph-l { font-size:11px; letter-spacing:2px; margin-bottom:1px; }
.ph-l.bag { color:#ef4444; } .ph-l.bench { color:#60a5fa; } .ph-l.tread { color:#f97316; } .ph-l.cool { color:#4ade80; }
.ph-i { font-size:12px; color:#666; font-family:Georgia,serif; line-height:1.4; }
.cool-step { font-size:12px; color:#666; font-family:Georgia,serif; line-height:1.8; }

/* WORKOUT */
#view-workout { background:#0a0a0a; padding-bottom:0; }
.wo-topbar { display:flex; justify-content:space-between; align-items:center; padding:18px 0 10px; }
.close-btn { background:none; border:none; color:#555; font-size:22px; padding:4px 8px 4px 0; }
.topbar-mid { font-size:11px; color:#555; letter-spacing:3px; font-family:monospace; }
.topbar-pct { font-size:11px; color:#555; font-family:monospace; }
.prog-wrap { height:2px; background:#1a1a1a; border-radius:2px; margin-bottom:18px; }
.prog-fill { height:100%; border-radius:2px; transition:width 1s linear; }
.rd-dots { display:flex; gap:5px; margin-bottom:18px; justify-content:center; flex-wrap:wrap; }
.rd-dot { height:22px; min-width:22px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:9px; font-family:monospace; transition:all 0.25s; border:1px solid #2a2a2a; color:#444; background:#1a1a1a; padding:0 4px; }

/* NOW PLAYING - WORKOUT */
.wo-now-playing { display:none; align-items:center; gap:8px; margin-bottom:14px; background:rgba(29,185,84,0.06); border:1px solid rgba(29,185,84,0.15); border-radius:10px; padding:10px 14px; }
.wo-now-playing.show { display:flex; }
.wo-np-bars { display:flex; gap:2px; align-items:flex-end; height:14px; flex-shrink:0; }
.wo-np-bar { width:3px; border-radius:2px; background:#1DB954; animation:npbar 0.8s ease-in-out infinite alternate; }
.wo-np-bar:nth-child(2) { animation-delay:0.2s; }
.wo-np-bar:nth-child(3) { animation-delay:0.4s; }
.wo-np-text { flex:1; min-width:0; }
.wo-np-track { font-size:11px; color:#1DB954; font-family:Georgia,serif; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.wo-np-artist { font-size:10px; color:#555; font-family:monospace; letter-spacing:1px; }

.timer-area { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding-bottom:10px; }
.st-lbl { font-size:12px; letter-spacing:5px; font-family:monospace; margin-bottom:6px; }
.rd-title-live { font-size:clamp(16px,4.5vw,21px); letter-spacing:2px; margin-bottom:4px; text-align:center; line-height:1.2; }
.combo-badge { font-size:11px; color:#f97316; letter-spacing:1px; font-family:monospace; background:rgba(249,115,22,0.1); padding:5px 14px; border-radius:20px; margin-bottom:12px; text-align:center; }
.timer-num { font-size:clamp(76px,21vw,114px); line-height:1; letter-spacing:-2px; transition:color 0.3s; text-align:center; }
.ph-dots-live { display:flex; gap:5px; margin-top:12px; margin-bottom:6px; }
.ph-dot-live { height:7px; border-radius:4px; background:#2a2a2a; transition:all 0.25s; }
.ph-lbl-live { font-size:16px; letter-spacing:4px; margin-top:5px; }
.ph-prog-wrap { width:100%; height:3px; background:#1a1a1a; border-radius:2px; margin-top:10px; overflow:hidden; }
.ph-prog-fill { height:100%; border-radius:2px; transition:width 1s linear; }
.instr-box { margin-top:16px; padding:16px 20px; background:#111; border-radius:14px; width:100%; text-align:center; border:1px solid #222; }
.instr-main { font-size:clamp(13px,3.5vw,15px); color:#ccc; font-family:Georgia,serif; line-height:1.6; }
.instr-warm { font-size:13px; color:#aaa; font-family:Georgia,serif; line-height:1.7; }
.instr-cool { font-size:12px; color:#aaa; font-family:Georgia,serif; line-height:1.9; }
.ya { color:#facc15; }
.next-up { margin-top:8px; font-size:10px; color:#444; font-family:monospace; letter-spacing:2px; }
.controls { display:flex; gap:10px; padding:16px 0 40px; }
.btn-pause { flex:2; padding:18px; border-radius:14px; color:#fff; font-size:18px; letter-spacing:4px; transition:all 0.2s; }
.btn-skip { flex:1; padding:18px 10px; background:transparent; border:1px solid #2a2a2a; border-radius:14px; color:#555; font-size:14px; letter-spacing:2px; }

/* OVERLAY */
.overlay { position:fixed; inset:0; background:rgba(10,10,10,0.96); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:200; gap:18px; padding:32px; }
.overlay.show { display:flex; }
.spinner { width:44px; height:44px; border:3px solid #1e1e1e; border-top-color:#ef4444; border-radius:50%; animation:spin 0.75s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.ov-gen-text { font-size:19px; letter-spacing:4px; color:#ef4444; }
.ov-gen-sub { font-size:11px; color:#444; font-family:monospace; letter-spacing:2px; text-align:center; line-height:1.8; }
.error-box { background:#161616; border:1px solid #2a1a1a; border-radius:16px; padding:24px; width:100%; text-align:center; max-width:360px; }
.error-title { font-size:18px; color:#ef4444; letter-spacing:3px; margin-bottom:10px; }
.error-msg { font-size:13px; color:#666; font-family:Georgia,serif; line-height:1.6; margin-bottom:18px; }
.btn-ok { padding:12px 32px; background:transparent; border:1px solid #333; border-radius:10px; color:#888; font-size:14px; letter-spacing:3px; }
</style>
</head>
<body>
<div id="app">

<!-- HOME -->
<div id="view-home" class="view active">
  <div class="logo-area">
    <div class="eyebrow">1REBEL STYLE</div>
    <div class="logo">RUMBLE</div>
    <div class="logo-sub">BAG · BENCH · FULL BODY</div>
  </div>

  <!-- SPOTIFY BAR -->
  <div class="spotify-bar" id="sp-bar">
    <div class="sp-info">
      <div class="sp-icon">♫</div>
      <div class="sp-text">
        <div class="sp-label">SPOTIFY</div>
        <div class="sp-name" id="sp-name">Not connected</div>
      </div>
    </div>
    <button class="btn-sp-connect" id="sp-btn" onclick="spotifyLogin()">CONNECT</button>
  </div>

  <!-- NOW PLAYING -->
  <div class="now-playing" id="now-playing">
    <div class="np-bars"><div class="np-bar"></div><div class="np-bar"></div><div class="np-bar"></div></div>
    <div class="np-text">
      <div class="np-track" id="np-track">—</div>
      <div class="np-artist" id="np-artist">—</div>
    </div>
  </div>

  <!-- PLAYLIST SETUP -->
  <div class="sp-playlists-card" id="sp-playlists-card">
    <div class="sp-pl-title">ASSIGN PLAYLISTS TO ROUNDS</div>
    <div class="sp-pl-row">
      <span class="sp-pl-label warmup">WARM UP</span>
      <select class="sp-pl-select" id="pl-warmup" onchange="savePlaylists()"><option value="">— None —</option></select>
    </div>
    <div class="sp-pl-row">
      <span class="sp-pl-label bag">BAG</span>
      <select class="sp-pl-select" id="pl-bag" onchange="savePlaylists()"><option value="">— None —</option></select>
    </div>
    <div class="sp-pl-row">
      <span class="sp-pl-label bench">BENCH</span>
      <select class="sp-pl-select" id="pl-bench" onchange="savePlaylists()"><option value="">— None —</option></select>
    </div>
    <div class="sp-pl-row">
      <span class="sp-pl-label tread">TREADMILL</span>
      <select class="sp-pl-select" id="pl-tread" onchange="savePlaylists()"><option value="">— None —</option></select>
    </div>
    <div class="sp-pl-row">
      <span class="sp-pl-label cool">COOL DOWN</span>
      <select class="sp-pl-select" id="pl-cool" onchange="savePlaylists()"><option value="">— None —</option></select>
    </div>
  </div>

  <!-- OPTIONS -->
  <div class="options-card">
    <div class="options-title">BUILD YOUR SESSION</div>
    <div class="option-group">
      <span class="option-label">ROUND LENGTH</span>
      <div class="pill-row">
        <button class="pill selected" data-group="rounds" data-val="7" onclick="selectPill(this)">7 MIN ROUNDS</button>
        <button class="pill" data-group="rounds" data-val="15" onclick="selectPill(this)">15 MIN ROUNDS</button>
      </div>
    </div>
    <div class="option-group">
      <span class="option-label">FOCUS</span>
      <div class="pill-row">
        <button class="pill selected" data-group="focus" data-val="full_body" onclick="selectPill(this)">FULL BODY</button>
        <button class="pill" data-group="focus" data-val="core" onclick="selectPill(this)">CORE</button>
        <button class="pill" data-group="focus" data-val="upper" onclick="selectPill(this)">UPPER BODY</button>
        <button class="pill" data-group="focus" data-val="lower" onclick="selectPill(this)">LOWER BODY</button>
      </div>
    </div>
    <div class="option-group">
      <span class="option-label">ADD-ONS</span>
      <div class="pill-row">
        <button class="toggle-pill" data-key="treadmill" onclick="toggleAddon(this)">🏃 TREADMILL +15MIN</button>
        <button class="toggle-pill" data-key="finisher" onclick="toggleAddon(this)">🔥 BRUTAL FINISHER</button>
      </div>
    </div>
  </div>

  <button class="btn-generate" id="gen-btn" onclick="generateWorkout()">⚡ BUILD WORKOUT</button>

  <div id="summary-area" style="display:none">
    <div class="summary-card">
      <div class="sum-title" id="sum-title"></div>
      <div class="sum-theme" id="sum-theme"></div>
      <div class="sum-tags" id="sum-tags"></div>
    </div>
    <button class="btn-start" onclick="startWorkout()">START SESSION</button>
    <button class="btn-outline" onclick="showView('overview')">PREVIEW ALL ROUNDS</button>
  </div>
</div>

<!-- OVERVIEW -->
<div id="view-overview" class="view" style="overflow-y:auto">
  <div class="ov-header">
    <button class="back-btn" onclick="showView('home')">←</button>
    <div>
      <div class="ov-eyebrow">SESSION OVERVIEW</div>
      <div class="ov-title-txt" id="ov-title"></div>
    </div>
  </div>
  <div id="overview-content"></div>
  <button class="btn-start" onclick="startWorkout()" style="margin-top:20px">LET'S GO</button>
</div>

<!-- WORKOUT -->
<div id="view-workout" class="view">
  <div class="wo-topbar">
    <button class="close-btn" onclick="exitWorkout()">✕</button>
    <div class="topbar-mid" id="topbar-mid"></div>
    <div class="topbar-pct" id="topbar-pct">0%</div>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="overall-fill" style="width:0%"></div></div>
  <div class="rd-dots" id="rd-dots"></div>
  <div class="wo-now-playing" id="wo-now-playing">
    <div class="wo-np-bars"><div class="wo-np-bar"></div><div class="wo-np-bar"></div><div class="wo-np-bar"></div></div>
    <div class="wo-np-text">
      <div class="wo-np-track" id="wo-np-track">—</div>
      <div class="wo-np-artist" id="wo-np-artist">—</div>
    </div>
  </div>
  <div class="timer-area">
    <div class="st-lbl" id="st-lbl"></div>
    <div class="rd-title-live" id="rd-title-live"></div>
    <div id="combo-wrap"></div>
    <div class="timer-num" id="timer-num">0:00</div>
    <div class="ph-dots-live" id="ph-dots-live"></div>
    <div class="ph-lbl-live" id="ph-lbl-live"></div>
    <div class="ph-prog-wrap"><div class="ph-prog-fill" id="ph-fill" style="width:0%"></div></div>
    <div class="instr-box" id="instr-box">
      <div id="instr-text" class="instr-main"></div>
    </div>
    <div class="next-up" id="next-up"></div>
  </div>
  <div class="controls">
    <button class="btn-pause" id="pause-btn" onclick="togglePause()">▶ START</button>
    <button class="btn-skip" onclick="skipPhase()">SKIP ⏭</button>
  </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay"></div>

</div>
<script>
// ═══════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════
const SPOTIFY_CLIENT_ID = '0881a7effda04d1a9b6cb68d78e97bd3';
const SPOTIFY_REDIRECT   = 'https://rumble-workout.netlify.app/callback';
const SPOTIFY_SCOPES     = 'user-read-playback-state user-modify-playback-state playlist-read-private playlist-read-collaborative streaming';

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
const opts = { rounds:'7', focus:'full_body', treadmill:false, finisher:false };
let workout = null;
let timerInterval = null, isRunning = false;
let timeLeft = 0, phaseDur = 0;
let inWarmup = false, inCooldown = false;
let activeRound = null, activePhase = 0;
let audioCtx = null;
let lastRoundType = null;

// Spotify state
let spToken = null;
let spRefreshToken = null;
let spUserName = '';
let spPlaylists = [];
let spAssigned = { warmup:'', bag:'', bench:'', tread:'', cool:'' };
let npPollInterval = null;

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
window.onload = () => {
  // Handle Spotify OAuth callback
  const hash = window.location.hash;
  const params = new URLSearchParams(window.location.search);

  // Try token from hash (implicit flow fallback)
  if (hash.includes('access_token')) {
    const hp = new URLSearchParams(hash.substring(1));
    spToken = hp.get('access_token');
    window.location.hash = '';
    onSpotifyConnected();
    return;
  }

  // Try auth code from query string (PKCE flow)
  const code = params.get('code');
  if (code) {
    exchangeCodeForToken(code);
    window.history.replaceState({}, '', window.location.pathname);
    return;
  }

  // Restore saved token
  const saved = localStorage.getItem('sp_token');
  if (saved) { spToken = saved; onSpotifyConnected(); }

  // Restore saved playlists
  const savedPl = localStorage.getItem('sp_assigned');
  if (savedPl) spAssigned = JSON.parse(savedPl);
};

// ═══════════════════════════════════════════════════
// SPOTIFY AUTH (PKCE)
// ═══════════════════════════════════════════════════
function generateCodeVerifier(length=128) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  let result = '';
  const arr = new Uint8Array(length);
  crypto.getRandomValues(arr);
  arr.forEach(x => result += chars[x % chars.length]);
  return result;
}

async function generateCodeChallenge(verifier) {
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(digest)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}

async function spotifyLogin() {
  const verifier = generateCodeVerifier();
  const challenge = await generateCodeChallenge(verifier);
  localStorage.setItem('sp_verifier', verifier);

  const url = new URL('https://accounts.spotify.com/authorize');
  url.searchParams.set('client_id', SPOTIFY_CLIENT_ID);
  url.searchParams.set('response_type', 'code');
  url.searchParams.set('redirect_uri', SPOTIFY_REDIRECT);
  url.searchParams.set('scope', SPOTIFY_SCOPES);
  url.searchParams.set('code_challenge_method', 'S256');
  url.searchParams.set('code_challenge', challenge);
  window.location.href = url.toString();
}

async function exchangeCodeForToken(code) {
  const verifier = localStorage.getItem('sp_verifier');
  if (!verifier) { showError('Auth error. Please try connecting again.'); return; }

  try {
    const res = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        client_id: SPOTIFY_CLIENT_ID,
        grant_type: 'authorization_code',
        code,
        redirect_uri: SPOTIFY_REDIRECT,
        code_verifier: verifier
      })
    });
    const data = await res.json();
    if (data.access_token) {
      spToken = data.access_token;
      localStorage.setItem('sp_token', spToken);
      if (data.refresh_token) {
        spRefreshToken = data.refresh_token;
        localStorage.setItem('sp_refresh', spRefreshToken);
      }
      onSpotifyConnected();
    } else {
      console.error('Token exchange failed', data);
    }
  } catch(e) { console.error('Token exchange error', e); }
}

async function refreshAccessToken() {
  const refresh = spRefreshToken || localStorage.getItem('sp_refresh');
  if (!refresh) return false;
  try {
    const res = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        client_id: SPOTIFY_CLIENT_ID,
        grant_type: 'refresh_token',
        refresh_token: refresh
      })
    });
    const data = await res.json();
    if (data.access_token) {
      spToken = data.access_token;
      localStorage.setItem('sp_token', spToken);
      return true;
    }
  } catch(e) {}
  return false;
}

async function spFetch(url, options={}) {
  let res = await fetch(url, { ...options, headers: { ...options.headers, 'Authorization': 'Bearer ' + spToken } });
  if (res.status === 401) {
    const ok = await refreshAccessToken();
    if (ok) res = await fetch(url, { ...options, headers: { ...options.headers, 'Authorization': 'Bearer ' + spToken } });
  }
  return res;
}

async function onSpotifyConnected() {
  try {
    const res = await spFetch('https://api.spotify.com/v1/me');
    if (!res.ok) { spToken = null; localStorage.removeItem('sp_token'); updateSpUI(); return; }
    const me = await res.json();
    spUserName = me.display_name || me.id;
    await loadUserPlaylists();
    updateSpUI();
    startNowPlayingPoll();
  } catch(e) { console.error(e); }
}

async function loadUserPlaylists() {
  spPlaylists = [];
  let url = 'https://api.spotify.com/v1/me/playlists?limit=50';
  while (url) {
    const res = await spFetch(url);
    if (!res.ok) break;
    const data = await res.json();
    spPlaylists.push(...(data.items || []).filter(p => p));
    url = data.next;
  }
  populatePlaylistSelects();
}

function populatePlaylistSelects() {
  const selects = ['warmup','bag','bench','tread','cool'];
  selects.forEach(key => {
    const sel = g('pl-' + key);
    if (!sel) return;
    sel.innerHTML = '<option value="">— None —</option>';
    spPlaylists.forEach(pl => {
      const opt = document.createElement('option');
      opt.value = pl.uri;
      opt.textContent = pl.name;
      if (spAssigned[key] === pl.uri) opt.selected = true;
      sel.appendChild(opt);
    });
  });
}

function savePlaylists() {
  ['warmup','bag','bench','tread','cool'].forEach(key => {
    const sel = g('pl-' + key);
    if (sel) spAssigned[key] = sel.value;
  });
  localStorage.setItem('sp_assigned', JSON.stringify(spAssigned));
}

function disconnectSpotify() {
  spToken = null; spUserName = ''; spPlaylists = [];
  localStorage.removeItem('sp_token');
  localStorage.removeItem('sp_refresh');
  localStorage.removeItem('sp_verifier');
  clearInterval(npPollInterval);
  updateSpUI();
}

function updateSpUI() {
  const connected = !!spToken;
  const bar = g('sp-bar');
  const nameEl = g('sp-name');
  const btn = g('sp-btn');
  const card = g('sp-playlists-card');

  bar.className = 'spotify-bar' + (connected ? ' connected' : '');
  nameEl.className = 'sp-name' + (connected ? ' connected' : '');
  nameEl.textContent = connected ? spUserName : 'Not connected';

  if (connected) {
    btn.textContent = 'DISCONNECT';
    btn.className = 'btn-sp-disconnect';
    btn.onclick = disconnectSpotify;
    card.classList.add('show');
  } else {
    btn.textContent = 'CONNECT';
    btn.className = 'btn-sp-connect';
    btn.onclick = spotifyLogin;
    card.classList.remove('show');
    g('now-playing').classList.remove('show');
  }
}

// ═══════════════════════════════════════════════════
// SPOTIFY PLAYBACK
// ═══════════════════════════════════════════════════
async function playPlaylistForType(type) {
  if (!spToken) return;
  const key = type === 'BAG' ? 'bag' : type === 'BENCH' ? 'bench' : type === 'TREAD' ? 'tread' : type === 'WARMUP' ? 'warmup' : 'cool';
  const uri = spAssigned[key];
  if (!uri) return;

  try {
    // Get active device
    const devRes = await spFetch('https://api.spotify.com/v1/me/player/devices');
    if (!devRes.ok) return;
    const devData = await devRes.json();
    const devices = devData.devices || [];
    const activeDevice = devices.find(d => d.is_active) || devices[0];
    if (!activeDevice) return;

    await spFetch('https://api.spotify.com/v1/me/player/play?device_id=' + activeDevice.id, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ context_uri: uri, offset: { position: 0 }, position_ms: 0 })
    });
  } catch(e) { console.error('Playback error', e); }
}

async function startNowPlayingPoll() {
  clearInterval(npPollInterval);
  await fetchNowPlaying();
  npPollInterval = setInterval(fetchNowPlaying, 5000);
}

async function fetchNowPlaying() {
  if (!spToken) return;
  try {
    const res = await spFetch('https://api.spotify.com/v1/me/player/currently-playing');
    if (res.status === 204 || !res.ok) {
      g('now-playing').classList.remove('show');
      g('wo-now-playing').classList.remove('show');
      return;
    }
    const data = await res.json();
    if (data && data.item) {
      const track = data.item.name;
      const artist = data.item.artists.map(a => a.name).join(', ');
      g('np-track').textContent = track;
      g('np-artist').textContent = artist;
      g('now-playing').classList.add('show');
      g('wo-np-track').textContent = track;
      g('wo-np-artist').textContent = artist;
      if (isRunning) g('wo-now-playing').classList.add('show');
    }
  } catch(e) {}
}

// ═══════════════════════════════════════════════════
// GENERATE WORKOUT
// ═══════════════════════════════════════════════════
async function generateWorkout() {
  showOverlay('loading');
  g('gen-btn').disabled = true;

  const rMins = parseInt(opts.rounds);
  const rSecs = rMins * 60;
  const focusMap = {
    full_body:'full body dumbbell + bodyweight exercises',
    core:'core-focused exercises (planks, rotations, sit-ups, mountain climbers, Russian twists)',
    upper:'upper body (push press, renegade rows, chest press, bent-over rows, shoulder press)',
    lower:'lower body (goblet squats, Romanian deadlifts, lunges, step-ups, hip thrusts)'
  };
  let setDur, restDur, doneDur;
  if (rMins === 7) { setDur=120; restDur=20; doneDur=20; }
  else { setDur=260; restDur=30; doneDur=30; }

  const treadSection = opts.treadmill ? `
After the 6 bag/bench rounds add one round: type "TREAD", title "TREADMILL SPRINTS", duration 900, combo null.
Phases summing to exactly 900s:
{"label":"WARM UP JOG","duration":120,"instruction":"Easy jog at 8-9 kph. Find your rhythm."},
{"label":"SPRINT 1","duration":30,"instruction":"Crank to 14-16 kph. Drive your arms."},
{"label":"RECOVER","duration":60,"instruction":"Back to 8 kph. Breathe."},
{"label":"SPRINT 2","duration":30,"instruction":"Faster. Push."},
{"label":"RECOVER","duration":60,"instruction":"Recover. 3 more."},
{"label":"SPRINT 3","duration":30,"instruction":"Mid-point. Stay tall."},
{"label":"RECOVER","duration":60,"instruction":"Halfway. Keep moving."},
{"label":"SPRINT 4","duration":30,"instruction":"Dig deep."},
{"label":"RECOVER","duration":60,"instruction":"One sprint left."},
{"label":"SPRINT 5","duration":30,"instruction":"Final push. Leave it all."},
{"label":"COOL DOWN JOG","duration":390,"instruction":"Walk it down. Heart rate dropping."}` : '';

  const finisherNote = opts.finisher ? 'Make Round 6 (last BENCH round) a brutal AMRAP with 4 compound exercises.' : '';

  const prompt = `You are a 1Rebel Rumble boxing instructor. Generate one complete Rumble workout session.

SETTINGS:
- Round length: ${rMins} minutes (${rSecs}s)
- Bench focus: ${focusMap[opts.focus]}
- 6 rounds alternating BAG, BENCH, BAG, BENCH, BAG, BENCH
${opts.treadmill ? '- Add treadmill block after round 6' : ''}
${finisherNote}

BENCH phases must sum to exactly ${rSecs}s:
SET 1: ${setDur}s, REST: ${restDur}s, SET 2: ${setDur}s, REST: ${restDur}s, SET 3: ${setDur}s, DONE: ${doneDur}s

BAG phases must sum to exactly ${rSecs}s. Use creative names: LEARN IT, BUILD IT, SPEED ROUND, POWER ROUND, FINISHER etc.
${treadSection}

Return ONLY raw JSON, nothing else:
{
  "title": "PUNCHY ALL CAPS TITLE",
  "theme": "One motivating sentence",
  "rounds": [
    {"id":1,"type":"BAG","title":"Round 1 — Name","duration":${rSecs},"combo":"Jab → Cross → Hook","phases":[{"label":"LEARN IT","duration":60,"instruction":"Cue under 15 words"}]},
    {"id":2,"type":"BENCH","title":"Round 2 — Name","duration":${rSecs},"combo":null,"phases":[{"label":"SET 1","duration":${setDur},"instruction":"Ex A x12, Ex B x10, Ex C x15"},{"label":"REST","duration":${restDur},"instruction":"Breathe."},{"label":"SET 2","duration":${setDur},"instruction":"Push harder."},{"label":"REST","duration":${restDur},"instruction":"Last rest."},{"label":"SET 3","duration":${setDur},"instruction":"Final set."},{"label":"DONE","duration":${doneDur},"instruction":"Transition."}]}
  ],
  "cooldown":{"duration":300,"steps":["Step 1 (1 min)","Step 2 (1 min)","Step 3 (1 min)","Step 4 (1 min)","Step 5 (1 min)"]}
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:2500, messages:[{role:'user',content:prompt}] })
    });
    if (!res.ok) throw new Error('API ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const raw = (data.content||[]).map(b=>b.text||'').join('').trim();
    let parsed = null;
    try { parsed = JSON.parse(raw); } catch(e) {}
    if (!parsed) {
      const s=raw.indexOf('{'), e=raw.lastIndexOf('}');
      if (s!==-1&&e>s) try { parsed=JSON.parse(raw.slice(s,e+1)); } catch(e2) {}
    }
    if (!parsed||!Array.isArray(parsed.rounds)||parsed.rounds.length<6) throw new Error('Incomplete workout. Please try again.');
    workout = parsed;
    hideOverlay();
    g('gen-btn').disabled = false;
    showSummary();
  } catch(err) {
    g('gen-btn').disabled = false;
    showOverlay('error', err.message);
  }
}

function showSummary() {
  g('summary-area').style.display = 'block';
  g('sum-title').textContent = workout.title;
  g('sum-theme').textContent = workout.theme;
  const tags = [
    {t:opts.rounds+' MIN ROUNDS',c:'red'},
    {t:opts.focus.replace('_',' ').toUpperCase(),c:'blue'}
  ];
  if (opts.treadmill) tags.push({t:'🏃 TREADMILL',c:'orange'});
  if (opts.finisher) tags.push({t:'🔥 FINISHER',c:'orange'});
  tags.push({t:workout.rounds.length+' ROUNDS',c:'green'});
  if (spToken) tags.push({t:'♫ SPOTIFY',c:'spotify'});
  g('sum-tags').innerHTML = tags.map(t=>`<span class="tag ${t.c}">${t.t}</span>`).join('');
  g('summary-area').scrollIntoView({behavior:'smooth',block:'start'});
}

function buildOverview() {
  if (!workout) return;
  g('ov-title').textContent = workout.title;
  const c = g('overview-content');
  c.innerHTML = `<div class="round-card warmup"><div class="round-head"><div class="round-nm">WARM-UP</div><span style="font-size:11px;color:#555;font-family:monospace">5:00</span></div><div class="ph-i">Shoulder rolls → shadowboxing → light cardio. Get into your stance.</div></div>`;
  workout.rounds.forEach(r => {
    const t = r.type.toLowerCase();
    let html = r.combo ? `<div class="combo-line">🥊 ${r.combo}</div>` : '';
    r.phases.forEach(p => {
      html += `<div class="ph-row"><div class="ph-t">${fmt(p.duration)}</div><div><div class="ph-l ${t}">${p.label}</div><div class="ph-i">${p.instruction}</div></div></div>`;
    });
    c.innerHTML += `<div class="round-card ${t}"><div class="round-head"><div class="round-nm">${r.title}</div><span class="badge ${t}">${r.type}</span></div>${html}</div>`;
  });
  c.innerHTML += `<div class="round-card cool"><div class="round-head"><div class="round-nm" style="color:#4ade80">COOL DOWN</div><span style="font-size:11px;color:#555;font-family:monospace">5:00</span></div>${workout.cooldown.steps.map(s=>`<div class="cool-step">• ${s}</div>`).join('')}</div>`;
}

// ═══════════════════════════════════════════════════
// WORKOUT ENGINE
// ═══════════════════════════════════════════════════
function startWorkout() {
  if (!workout) return;
  showView('workout');
  inWarmup=true; inCooldown=false;
  activeRound=null; activePhase=0;
  timeLeft=300; phaseDur=300;
  isRunning=false; lastRoundType=null;
  buildDots(); refreshWO();
  const pb=g('pause-btn');
  pb.textContent='▶ START';
  pb.style.background='linear-gradient(135deg,#ef4444,#dc2626)';
  pb.style.border='1px solid #ef4444';
  pb.style.boxShadow='0 5px 22px rgba(239,68,68,0.35)';
  if (spToken) playPlaylistForType('WARMUP');
}

function exitWorkout() {
  clearInterval(timerInterval); isRunning=false;
  g('wo-now-playing').classList.remove('show');
  showView('home');
}

function togglePause() {
  if (!isRunning) { isRunning=true; runTimer(); if(spToken) g('wo-now-playing').classList.add('show'); }
  else { isRunning=false; clearInterval(timerInterval); }
  refreshWO();
}

function runTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!isRunning) return;
    if (timeLeft<=4&&timeLeft>0) beep('tick');
    timeLeft--;
    if (timeLeft<=0) { beep('end'); advance(); }
    refreshWO();
  }, 1000);
}

function advance() {
  if (inWarmup) {
    inWarmup=false; activeRound=0; activePhase=0;
    timeLeft=workout.rounds[0].phases[0].duration; phaseDur=timeLeft;
    triggerSpotifyIfNeeded('BAG'); return;
  }
  if (inCooldown) { clearInterval(timerInterval); isRunning=false; g('wo-now-playing').classList.remove('show'); showView('home'); return; }
  if (activeRound!==null) {
    const r=workout.rounds[activeRound];
    if (activePhase+1<r.phases.length) {
      activePhase++; timeLeft=r.phases[activePhase].duration; phaseDur=timeLeft;
    } else if (activeRound+1<workout.rounds.length) {
      activeRound++; activePhase=0;
      timeLeft=workout.rounds[activeRound].phases[0].duration; phaseDur=timeLeft;
      triggerSpotifyIfNeeded(workout.rounds[activeRound].type);
    } else {
      inCooldown=true; activeRound=null;
      timeLeft=workout.cooldown.duration; phaseDur=timeLeft;
      triggerSpotifyIfNeeded('COOL');
    }
  }
}

function triggerSpotifyIfNeeded(type) {
  if (!spToken) return;
  if (type !== lastRoundType) {
    lastRoundType = type;
    playPlaylistForType(type);
    setTimeout(fetchNowPlaying, 2000);
  }
}

function skipPhase() { beep('end'); advance(); refreshWO(); }

// ═══════════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════════
function accent() {
  if (inCooldown) return '#4ade80';
  if (inWarmup) return '#facc15';
  if (activeRound!==null) {
    const t=workout.rounds[activeRound].type;
    return t==='BAG'?'#ef4444':t==='TREAD'?'#f97316':'#3b82f6';
  }
  return '#ef4444';
}

function refreshWO() {
  const ac=accent();
  const r=activeRound!==null?workout.rounds[activeRound]:null;
  const p=r?r.phases[activePhase]:null;
  const total=workout.rounds.length;
  let pct=0;
  if (inCooldown) pct=95;
  else if (!inWarmup&&activeRound!==null)
    pct=Math.round(5+(activeRound/total)*85+(activePhase/(r.phases.length||1))*(85/total));
  setStyle('overall-fill',{width:pct+'%',background:ac});
  g('topbar-pct').textContent=pct+'%';
  g('topbar-mid').textContent=workout.title.split('—')[0].trim();
  updateDots(ac);
  const tn=g('timer-num');
  tn.textContent=fmt(timeLeft);
  tn.style.color=timeLeft<=10?ac:'#fff';
  tn.style.textShadow=timeLeft<=10?`0 0 40px ${ac}80`:'none';
  const sl=g('st-lbl'); sl.style.color=ac;
  sl.textContent=inWarmup?'WARM-UP':inCooldown?'COOL DOWN':r?r.type:'';
  g('rd-title-live').textContent=inWarmup?'GET READY':inCooldown?'COOL DOWN':r?r.title:'';
  g('combo-wrap').innerHTML=(r&&r.combo)?`<div class="combo-badge">🥊 ${r.combo}</div>`:'<div style="height:12px"></div>';
  const pd=g('ph-dots-live');
  pd.innerHTML=r?r.phases.map((_,i)=>{
    const w=i===activePhase?'18px':'7px';
    const bg=i<=activePhase?ac:'#2a2a2a';
    return `<div class="ph-dot-live" style="width:${w};background:${bg}"></div>`;
  }).join(''):'';
  const pll=g('ph-lbl-live'); pll.style.color=ac;
  pll.textContent=inWarmup?'WARM UP':inCooldown?'STRETCH':p?p.label:'';
  const phPct=phaseDur>0?((phaseDur-timeLeft)/phaseDur)*100:0;
  setStyle('ph-fill',{width:phPct+'%',background:ac});
  g('instr-box').style.borderColor=ac+'35';
  const it=g('instr-text');
  if (inWarmup) { it.className='instr-warm'; it.innerHTML='Shoulder rolls → neck → hips → wrists<br>Slow shadowboxing, find your stance<br><span class="ya">Left foot forward · Hands up · Stay light</span>'; }
  else if (inCooldown) { it.className='instr-cool'; it.innerHTML=workout.cooldown.steps.map(s=>`<div>• ${s}</div>`).join(''); }
  else { it.className='instr-main'; it.textContent=p?p.instruction:''; }
  const nu=g('next-up');
  nu.textContent=(r&&p&&activePhase<r.phases.length-1)?`NEXT: ${r.phases[activePhase+1].label} · ${fmt(r.phases[activePhase+1].duration)}`:'';
  const pb=g('pause-btn');
  pb.textContent=isRunning?'⏸ PAUSE':'▶ RESUME';
  if (isRunning) { pb.style.background='#161616'; pb.style.border='1px solid #2a2a2a'; pb.style.boxShadow='none'; }
  else { pb.style.background=`linear-gradient(135deg,${ac},${ac}cc)`; pb.style.border=`1px solid ${ac}`; pb.style.boxShadow=`0 5px 22px ${ac}38`; }
}

function buildDots() {
  const labels=['W',...workout.rounds.map(r=>r.type==='TREAD'?'T':r.type[0]),'C'];
  g('rd-dots').innerHTML=labels.map((l,i)=>`<div class="rd-dot" id="dot-${i}">${l}</div>`).join('');
}

function updateDots(ac) {
  const total=workout.rounds.length;
  for (let i=0;i<=total+1;i++) {
    const d=document.getElementById('dot-'+i); if (!d) continue;
    const isA=(i===0&&inWarmup)||(i===total+1&&inCooldown)||(i>0&&i-1===activeRound);
    const isDone=(i===0&&!inWarmup&&(activeRound!==null||inCooldown))||(i>0&&i<=total&&(activeRound!==null&&i-1<activeRound||inCooldown));
    const col=i===0?'#facc15':i===total+1?'#4ade80':workout.rounds[i-1]?.type==='BAG'?'#ef4444':workout.rounds[i-1]?.type==='TREAD'?'#f97316':'#3b82f6';
    d.style.minWidth=isA?'32px':'24px';
    d.style.background=isA?col:isDone?col+'35':'#1a1a1a';
    d.style.borderColor=isA?col:isDone?col+'55':'#2a2a2a';
    d.style.color=isA?'#000':isDone?col:'#444';
  }
}

// ═══════════════════════════════════════════════════
// OVERLAY
// ═══════════════════════════════════════════════════
function showOverlay(type, msg) {
  const o=g('overlay'); o.classList.add('show');
  if (type==='loading') {
    o.innerHTML=`<div class="spinner"></div><div class="ov-gen-text">BUILDING SESSION</div><div class="ov-gen-sub">AI is crafting your workout<br>Takes 10–20 seconds</div>`;
  } else {
    o.innerHTML=`<div class="error-box"><div class="error-title">ERROR</div><div class="error-msg">${msg||'Something went wrong.'}<br><br>Check your connection and try again.</div><button class="btn-ok" onclick="hideOverlay()">OK</button></div>`;
  }
}
function hideOverlay() { g('overlay').classList.remove('show'); }

// ═══════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════
function beep(type) {
  try {
    if (!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    const o=audioCtx.createOscillator(),gn=audioCtx.createGain();
    o.connect(gn); gn.connect(audioCtx.destination);
    const t=audioCtx.currentTime;
    if (type==='end') { o.frequency.value=880; gn.gain.setValueAtTime(0.3,t); gn.gain.exponentialRampToValueAtTime(0.001,t+0.5); o.start(); o.stop(t+0.5); }
    else { o.frequency.value=440; gn.gain.setValueAtTime(0.15,t); gn.gain.exponentialRampToValueAtTime(0.001,t+0.1); o.start(); o.stop(t+0.1); }
  } catch(e) {}
}

// ═══════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════
function fmt(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }
function g(id) { return document.getElementById(id); }
function setStyle(id,styles) { Object.assign(g(id).style,styles); }

if ('wakeLock' in navigator) {
  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState==='visible'&&isRunning)
      try { await navigator.wakeLock.request('screen'); } catch(e) {}
  });
}
</script>
