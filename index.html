<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forge</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --surface: #111111; --surface2: #161616;
    --border: #1f1f1f; --border2: #2a2a2a; --text: #e8e8e8;
    --muted: #666; --dim: #333;
    --green: #4ade80; --green-dim: #0d2016; --green-border: #1a3320;
    --yellow: #facc15; --yellow-dim: #1a1400; --yellow-border: #2e2500;
    --blue: #60a5fa; --blue-dim: #0d1a2e; --blue-border: #1a2e45;
    --orange: #f97316; --red: #f87171;
    --purple: #a78bfa; --purple-dim: #120d1e; --purple-border: #241852;
    --radius: 14px; --radius-sm: 9px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; overflow-x: hidden;
  }

  /* ── NAV ── */
  .nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,10,0.96); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px; display: flex; align-items: center;
    justify-content: space-between; height: 54px;
  }
  .nav-brand {
    font-size: 14px; font-weight: 700; letter-spacing: 0.18em;
    color: var(--green); text-transform: uppercase; text-decoration: none;
  }
  .nav-date {
    font-size: 12px; color: var(--muted); font-weight: 400;
  }

  /* ── LAYOUT ── */
  .page { max-width: 480px; margin: 0 auto; padding: 20px 16px 40px; }

  /* ── LAST SESSION ── */
  .section-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
  }

  .last-session {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px; margin-bottom: 20px;
    cursor: pointer; transition: border-color 0.2s;
    text-decoration: none; display: block; color: inherit;
  }
  .last-session:hover { border-color: var(--border2); }
  .last-session-empty {
    background: var(--surface); border: 1px dashed var(--border2);
    border-radius: var(--radius); padding: 18px;
    text-align: center; margin-bottom: 20px;
    font-size: 13px; color: var(--muted);
  }
  .ls-meta { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
  .ls-name { font-size: 16px; font-weight: 700; margin-bottom: 10px; }
  .ls-stats { display: flex; gap: 16px; flex-wrap: wrap; }
  .ls-stat { font-size: 13px; color: var(--muted); }
  .ls-stat strong { color: var(--text); font-weight: 600; }

  /* ── UP NEXT ── */
  .next-card {
    border-radius: var(--radius); padding: 20px;
    border: 1px solid; cursor: pointer;
    transition: filter 0.15s, transform 0.12s;
  }
  .next-card:hover { filter: brightness(1.2); transform: translateY(-1px); }
  .next-card:active { transform: scale(0.985); }
  .next-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .next-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .next-detail { font-size: 13px; color: var(--muted); margin-bottom: 18px; line-height: 1.5; }
  .next-cta {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(0,0,0,0.25); border-radius: var(--radius-sm);
    padding: 12px 16px;
  }
  .next-cta-text { font-size: 14px; font-weight: 700; }
  .next-cta-arrow { font-size: 18px; }

  /* ── WEEK LOAD ── */
  .week-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px; margin-bottom: 20px;
  }
  .week-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .week-row:last-child { border-bottom: none; padding-bottom: 0; }
  .week-row:first-child { padding-top: 0; }
  .week-row-left { display: flex; align-items: center; gap: 10px; }
  .week-row-icon { font-size: 15px; width: 22px; text-align: center; }
  .week-row-label { font-size: 13px; font-weight: 500; }
  .week-row-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .week-dots { display: flex; gap: 5px; align-items: center; }
  .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--border2); transition: background 0.3s;
  }
  .dot.done-run { background: var(--green); }
  .dot.done-box { background: var(--orange); }

  /* ── RECENT HISTORY ── */
  .hist-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 14px;
    text-decoration: none; color: inherit; display: flex;
    align-items: center; gap: 12px; margin-bottom: 8px;
    transition: border-color 0.18s;
  }
  .hist-item:last-child { margin-bottom: 0; }
  .hist-item:hover { border-color: var(--border2); }
  .hist-icon { font-size: 18px; flex-shrink: 0; width: 28px; text-align: center; }
  .hist-body { flex: 1; min-width: 0; }
  .hist-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hist-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .hist-badge {
    font-size: 11px; font-weight: 600; padding: 3px 8px;
    border-radius: 20px; flex-shrink: 0; white-space: nowrap;
  }
  .hist-empty { font-size: 13px; color: var(--muted); text-align: center; padding: 16px 0; }

  /* ── OR PILL ── */
  .or-pill {
    display: flex; align-items: center; gap: 8px;
    margin-top: 10px;
  }
  .or-label { font-size: 11px; color: var(--dim); flex-shrink: 0; }
  .or-btn {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 600; padding: 6px 12px;
    border-radius: 20px; text-decoration: none;
    border: 1px solid; transition: filter 0.15s;
  }
  .or-btn:hover { filter: brightness(1.25); }

  /* ── DIVIDER ── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 4px 0 20px; }

  /* ── ANIMATE IN ── */
  .fade-up {
    opacity: 0; transform: translateY(10px);
    animation: fadeUp 0.35s ease forwards;
  }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  .d1 { animation-delay: 0.05s; }
  .d2 { animation-delay: 0.12s; }
  .d3 { animation-delay: 0.19s; }
  .d4 { animation-delay: 0.26s; }
  .d5 { animation-delay: 0.33s; }
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-brand">Forge</span>
  <span class="nav-date" id="nav-date"></span>
</nav>

<div class="page">

  <!-- LAST SESSION -->
  <div class="section-label fade-up d1">Last Session</div>
  <div id="last-session-el" class="fade-up d1"></div>

  <hr class="divider">

  <!-- UP NEXT -->
  <div class="section-label fade-up d2">Up Next</div>
  <div id="next-session-el" class="fade-up d2"></div>

  <hr class="divider">

  <!-- THIS WEEK -->
  <div class="section-label fade-up d3">This Week</div>
  <div class="week-card fade-up d3">
    <div class="week-row">
      <div class="week-row-left">
        <div class="week-row-icon">🏃</div>
        <div>
          <div class="week-row-label">Running</div>
          <div class="week-row-sub" id="week-run-sub">0 runs · 0km</div>
        </div>
      </div>
      <div class="week-dots" id="week-run-dots"></div>
    </div>
    <div class="week-row">
      <div class="week-row-left">
        <div class="week-row-icon">🥊</div>
        <div>
          <div class="week-row-label">Boxing</div>
          <div class="week-row-sub" id="week-box-sub">0 sessions</div>
        </div>
      </div>
      <div class="week-dots" id="week-box-dots"></div>
    </div>
  </div>

  <hr class="divider">

  <!-- RECENT HISTORY -->
  <div class="section-label fade-up d4">Recent</div>
  <div id="recent-history-el" class="fade-up d4"></div>

  <hr class="divider" style="margin-top:20px">

  <!-- NAV CARDS -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px" class="fade-up d5">
    <a href="running.html" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-decoration:none;color:inherit;display:block;transition:border-color 0.18s">
      <div style="font-size:20px;margin-bottom:8px">🏃</div>
      <div style="font-size:13px;font-weight:700;margin-bottom:2px">Running</div>
      <div style="font-size:11px;color:var(--muted)">Plan · Log · History</div>
    </a>
    <a href="rumble.html" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-decoration:none;color:inherit;display:block;transition:border-color 0.18s">
      <div style="font-size:20px;margin-bottom:8px">🥊</div>
      <div style="font-size:13px;font-weight:700;margin-bottom:2px">Boxing</div>
      <div style="font-size:11px;color:var(--muted)">Generate · History</div>
    </a>
  </div>

</div>

<script>
// ── DATE ──────────────────────────────────────
const now = new Date();
document.getElementById('nav-date').textContent = now.toLocaleDateString('en-GB', {
  weekday: 'short', day: 'numeric', month: 'short'
});

// ── DATA ──────────────────────────────────────
function getRuns()   { try { return JSON.parse(localStorage.getItem('rumble_runs')||'[]'); } catch { return []; } }
function getBoxing() { try { return JSON.parse(localStorage.getItem('sessionHistory')||'[]'); } catch { return []; } }
// Boxing date is a Unix timestamp (Date.now()), convert to YYYY-MM-DD
function boxDate(b) { if (!b.date) return ''; return new Date(b.date).toISOString().split('T')[0]; }

function daysSince(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr + 'T12:00:00');
  return Math.floor((now - d) / 86400000);
}
function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s + 'T12:00:00');
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}
function fmtDaysAgo(n) {
  if (n === 0) return 'Today';
  if (n === 1) return 'Yesterday';
  return n + ' days ago';
}

// ── PLAN RUNS (mirror from running.html) ──────
const PLAN_RUNS = [
  {id:'p1', w:1, type:'easy',      label:'Easy Run',        detail:'4km · 6\'30"–7\'00"/km',                       css:'run', accent:'var(--green)',  bg:'#0a1a10', border:'#1a3320'},
  {id:'p2', w:1, type:'tempo',     label:'Tempo Run',       detail:'5km total · 3km at 5\'30"–5\'45"/km',          css:'run', accent:'var(--yellow)', bg:'#1a1400', border:'#2e2500'},

  {id:'p5', w:2, type:'tempo',     label:'Tempo Run',       detail:'5km · 3km at 5\'28"–5\'43"/km',                css:'run', accent:'var(--yellow)', bg:'#1a1400', border:'#2e2500'},
  {id:'p6', w:2, type:'long',      label:'Long Run',        detail:'6.5km · 6\'15"–6\'30"/km',                     css:'run', accent:'var(--blue)',   bg:'#0a1520', border:'#1a2e45'},
  {id:'p7', w:3, type:'easy',      label:'Easy Run',        detail:'5km · 6\'30"–7\'00"/km',                       css:'run', accent:'var(--green)',  bg:'#0a1a10', border:'#1a3320'},
  {id:'p8', w:3, type:'tempo',     label:'Tempo Run',       detail:'5.5km · 3.5km at 5\'30"–5\'45"/km',            css:'run', accent:'var(--yellow)', bg:'#1a1400', border:'#2e2500'},
  {id:'p9', w:3, type:'long',      label:'Long Run',        detail:'7km · 6\'15"–6\'30"/km',                       css:'run', accent:'var(--blue)',   bg:'#0a1520', border:'#1a2e45'},
  {id:'p10',w:4, type:'easy',      label:'Easy Run',        detail:'4km easy · fresh legs before time trial',       css:'run', accent:'var(--green)',  bg:'#0a1a10', border:'#1a3320'},
  {id:'p11',w:4, type:'race',      label:'5k Time Trial',   detail:'5km max effort · Phase 1 benchmark',            css:'run', accent:'var(--red)',    bg:'#1e0a0a', border:'#3d1515'},
  {id:'p12',w:4, type:'long',      label:'Long Run',        detail:'7.5km · 6\'15"–6\'30"/km',                     css:'run', accent:'var(--blue)',   bg:'#0a1520', border:'#1a2e45'},
  {id:'p13',w:5, type:'intervals', label:'Intervals',       detail:'5×800m at 4\'45"–5\'00"/km · 90s rest',        css:'run', accent:'var(--purple)', bg:'#120d1e', border:'#241852'},
  {id:'p14',w:5, type:'tempo',     label:'Tempo Run',       detail:'4km at 5\'15"–5\'30"/km',                      css:'run', accent:'var(--yellow)', bg:'#1a1400', border:'#2e2500'},
  {id:'p15',w:5, type:'long',      label:'Long Run',        detail:'8km · 6\'00"–6\'20"/km',                       css:'run', accent:'var(--blue)',   bg:'#0a1520', border:'#1a2e45'},
  {id:'p16',w:6, type:'intervals', label:'Intervals',       detail:'6×800m at 4\'45"–5\'00"/km · 90s rest',        css:'run', accent:'var(--purple)', bg:'#120d1e', border:'#241852'},
  {id:'p17',w:6, type:'tempo',     label:'Tempo Run',       detail:'4km at 5\'15"–5\'28"/km',                      css:'run', accent:'var(--yellow)', bg:'#1a1400', border:'#2e2500'},
  {id:'p18',w:6, type:'long',      label:'Long Run',        detail:'8.5km · 6\'00"–6\'20"/km',                     css:'run', accent:'var(--blue)',   bg:'#0a1520', border:'#1a2e45'},
  {id:'p19',w:7, type:'intervals', label:'Intervals',       detail:'4×1km at 4\'50"–5\'05"/km · 2min rest',        css:'run', accent:'var(--purple)', bg:'#120d1e', border:'#241852'},
  {id:'p20',w:7, type:'tempo',     label:'Tempo Run',       detail:'4.5km at 5\'10"–5\'25"/km',                    css:'run', accent:'var(--yellow)', bg:'#1a1400', border:'#2e2500'},
  {id:'p21',w:7, type:'long',      label:'Long Run',        detail:'9km · 6\'00"–6\'15"/km',                       css:'run', accent:'var(--blue)',   bg:'#0a1520', border:'#1a2e45'},
  {id:'p22',w:8, type:'intervals', label:'Intervals',       detail:'5×1km at 4\'50"–5\'05"/km · even splits',      css:'run', accent:'var(--purple)', bg:'#120d1e', border:'#241852'},
  {id:'p23',w:8, type:'race',      label:'5k Time Trial',   detail:'5km max effort · Phase 2 benchmark',            css:'run', accent:'var(--red)',    bg:'#1e0a0a', border:'#3d1515'},
  {id:'p24',w:8, type:'long',      label:'Long Run',        detail:'9.5km · 6\'00"–6\'15"/km',                     css:'run', accent:'var(--blue)',   bg:'#0a1520', border:'#1a2e45'},
  {id:'p25',w:9, type:'intervals', label:'Intervals',       detail:'5×1km at 4\'55"–5\'10"/km · 2min rest',        css:'run', accent:'var(--purple)', bg:'#120d1e', border:'#241852'},
  {id:'p26',w:9, type:'tempo',     label:'Tempo Run',       detail:'5km at 5\'10"–5\'25"/km',                      css:'run', accent:'var(--yellow)', bg:'#1a1400', border:'#2e2500'},
  {id:'p27',w:9, type:'long',      label:'Long Run',        detail:'9km · 6\'00"–6\'15"/km',                       css:'run', accent:'var(--blue)',   bg:'#0a1520', border:'#1a2e45'},
  {id:'p28',w:10,type:'intervals', label:'Intervals',       detail:'6×1km at 4\'55"–5\'10"/km · 90s rest',         css:'run', accent:'var(--purple)', bg:'#120d1e', border:'#241852'},
  {id:'p29',w:10,type:'tempo',     label:'Tempo Run',       detail:'5km at 5\'05"–5\'20"/km',                      css:'run', accent:'var(--yellow)', bg:'#1a1400', border:'#2e2500'},
  {id:'p30',w:10,type:'long',      label:'Long Run',        detail:'9.5km · 6\'00"–6\'15"/km',                     css:'run', accent:'var(--blue)',   bg:'#0a1520', border:'#1a2e45'},
  {id:'p31',w:11,type:'intervals', label:'Intervals',       detail:'3×2km at 5\'00"–5\'10"/km · 2min rest',        css:'run', accent:'var(--purple)', bg:'#120d1e', border:'#241852'},
  {id:'p32',w:11,type:'tempo',     label:'Tempo Run',       detail:'5km at 5\'00"–5\'15"/km',                      css:'run', accent:'var(--yellow)', bg:'#1a1400', border:'#2e2500'},
  {id:'p33',w:11,type:'long',      label:'Long Run',        detail:'10km · 6\'00"–6\'10"/km · your first 10k',     css:'run', accent:'var(--blue)',   bg:'#0a1520', border:'#1a2e45'},
  {id:'p34',w:12,type:'easy',      label:'Shakeout',        detail:'3km very easy · legs moving only',              css:'run', accent:'var(--green)',  bg:'#0a1a10', border:'#1a3320'},
  {id:'p35',w:12,type:'race',      label:'5k Time Trial',   detail:'5km max effort · goal sub-25min',               css:'run', accent:'var(--red)',    bg:'#1e0a0a', border:'#3d1515'},
  {id:'p36',w:12,type:'race',      label:'10k Time Trial',  detail:'10km max effort · goal sub-60min',              css:'run', accent:'var(--red)',    bg:'#1e0a0a', border:'#3d1515'},
];

// Boxing 4-week programme sessions (types that Rumble generates)
const BOX_WEEK_TARGET = 2; // sessions per week target
const RUN_WEEK_TARGET = 3;

// ── LAST SESSION ──────────────────────────────
function renderLastSession() {
  const runs = getRuns();
  const boxing = getBoxing();
  const el = document.getElementById('last-session-el');

  // Find most recent of either
  const lastRun = runs.length ? runs[runs.length - 1] : null;
  const lastBox = boxing.length ? boxing[boxing.length - 1] : null;

  let lastRunDate = lastRun ? (lastRun.date || '') : '';
  let lastBoxDate = lastBox ? boxDate(lastBox) : '';

  const runNewer = lastRunDate >= lastBoxDate;
  const last = runNewer ? lastRun : lastBox;
  const isRun = runNewer && lastRun;

  if (!last) {
    el.innerHTML = `<div class="last-session-empty">No sessions logged yet — start below</div>`;
    return;
  }

  if (isRun) {
    const ago = daysSince(lastRun.date);
    el.innerHTML = `
      <a href="running.html" class="last-session">
        <div class="ls-meta">🏃 Run · ${fmtDate(lastRun.date)} · ${fmtDaysAgo(ago)}</div>
        <div class="ls-name">${lastRun.name || 'Run'}</div>
        <div class="ls-stats">
          ${lastRun.distance ? `<span class="ls-stat"><strong>${lastRun.distance}km</strong></span>` : ''}
          ${lastRun.avgPace  ? `<span class="ls-stat"><strong>${lastRun.avgPace}/km</strong></span>` : ''}
          ${lastRun.time     ? `<span class="ls-stat">${lastRun.time}</span>` : ''}
          ${lastRun.hrAvg    ? `<span class="ls-stat">♥ ${lastRun.hrAvg}bpm</span>` : ''}
        </div>
      </a>`;
  } else {
    const bDate = boxDate(lastBox);
    const ago = daysSince(bDate);
    const type = lastBox.title || lastBox.type || lastBox.sessionType || 'Boxing Session';
    el.innerHTML = `
      <a href="rumble.html" class="last-session">
        <div class="ls-meta">🥊 Boxing · ${fmtDate(bDate)} · ${fmtDaysAgo(ago)}</div>
        <div class="ls-name">${type}</div>
        <div class="ls-stats">
          ${lastBox.duration ? `<span class="ls-stat"><strong>${lastBox.duration} min</strong></span>` : ''}
          ${lastBox.rounds   ? `<span class="ls-stat">${lastBox.rounds} rounds</span>` : ''}
        </div>
      </a>`;
  }
}

// ── NEXT SESSION ──────────────────────────────
function getNextRun() {
  const runs = getRuns();
  const loggedIds   = new Set(runs.map(r => r.planRunId).filter(Boolean));
  const loggedNames = new Set(runs.map(r => r.name));
  return PLAN_RUNS.find(r => !loggedIds.has(r.id) && !loggedNames.has(r.name)) || null;
}

function renderNextSession() {
  const el = document.getElementById('next-session-el');
  const runs = getRuns();
  const boxing = getBoxing();
  const nextRun = getNextRun();

  if (!nextRun) {
    el.innerHTML = `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:center">
        <div style="font-size:24px;margin-bottom:8px">🏆</div>
        <div style="font-size:15px;font-weight:700">Running plan complete</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">All 36 runs done</div>
      </div>`;
    return;
  }

  const lastRunDate = runs.length ? (runs[runs.length-1].date || '') : '';
  const lastBoxDate = boxing.length ? boxDate(boxing[boxing.length-1]) : '';
  const runDaysAgo = lastRunDate ? daysSince(lastRunDate) : 999;
  const boxDaysAgo = lastBoxDate ? daysSince(lastBoxDate) : 999;

  // ── Smarter Up Next logic ──────────────────────────────────────
  // Count runs/boxing in last 7 days to detect load imbalance
  const sevenDaysAgo = new Date(now); sevenDaysAgo.setDate(now.getDate() - 7);
  const sevenStr = sevenDaysAgo.toISOString().split('T')[0];
  const recentRuns  = runs.filter(r => (r.date||'') >= sevenStr).length;
  const recentBox   = boxing.filter(b => boxDate(b) >= sevenStr).length;

  // Check if today is a natural rest day by schedule (Mon, Thu = rest; Tue/Sat = boxing)
  const todayDow = now.getDay(); // 0=Sun,1=Mon,...
  const scheduleRestDays  = new Set([1, 4]);     // Mon, Thu
  const scheduleBoxingDays = new Set([2, 6]);    // Tue, Sat
  const todayIsRest   = scheduleRestDays.has(todayDow);
  const todayIsBoxing = scheduleBoxingDays.has(todayDow);

  // Never suggest running two days in a row
  const ranYesterday = runDaysAgo === 1;
  const ranToday     = runDaysAgo === 0;

  let suggestBoxing = false;
  let restDay = false;

  if (todayIsRest && runDaysAgo <= 1) {
    // On a rest day after recent running: show a rest prompt instead
    restDay = true;
  } else if (ranToday) {
    // Already ran today — flip to boxing
    suggestBoxing = true;
  } else if (ranYesterday && !todayIsBoxing) {
    // Ran yesterday and today isn't a scheduled boxing day: rest or boxing
    suggestBoxing = boxDaysAgo >= 2;
  } else if (todayIsBoxing && boxDaysAgo >= 2) {
    // Schedule says box today and it's been 2+ days
    suggestBoxing = true;
  } else if (recentRuns >= 3 && recentBox < 1) {
    // 3+ runs in 7 days with zero boxing: push boxing
    suggestBoxing = true;
  } else if (runDaysAgo <= boxDaysAgo) {
    // Default: if ran more recently than boxed, suggest boxing
    suggestBoxing = boxDaysAgo >= 2;
  }

  if (restDay) {
    el.innerHTML = `
      <div style="background:var(--surface);border:1px dashed var(--border2);border-radius:var(--radius);padding:20px 18px;text-align:center">
        <div style="font-size:24px;margin-bottom:8px">😴</div>
        <div style="font-size:16px;font-weight:700;margin-bottom:4px">Rest Day</div>
        <div style="font-size:12px;color:var(--muted);line-height:1.5">Recovery is part of the plan.<br>Next up: <strong style="color:var(--text)">${nextRun.label}</strong></div>
      </div>
      <div class="or-pill" style="margin-top:12px;justify-content:center">
        <span class="or-label">Feeling good?</span>
        <a href="rumble.html" class="or-btn" style="color:var(--orange);border-color:#3d2200;background:#1a0e00">🥊 Box instead</a>
      </div>`;
    return;
  }

  if (suggestBoxing) {
    el.innerHTML = `
      <a href="rumble.html" class="next-card" style="background:#1a0e00;border-color:#3d2200;text-decoration:none;color:inherit">
        <div class="next-label" style="color:var(--orange)">Boxing · Recommended today</div>
        <div class="next-title">Boxing Session</div>
        <div class="next-detail">${ranYesterday ? 'Recovery day — bag work over another run' : runDaysAgo < 999 ? `Last ran ${fmtDaysAgo(runDaysAgo).toLowerCase()} — good day to cross-train` : 'Start with a boxing session'}</div>
        <div class="next-cta" style="border:1px solid #3d2200">
          <span class="next-cta-text" style="color:var(--orange)">Start Session →</span>
          <span class="next-cta-arrow">🥊</span>
        </div>
      </a>
      <div class="or-pill">
        <span class="or-label">Or run instead:</span>
        <a href="running.html" class="or-btn" style="color:var(--green);border-color:var(--green-border);background:var(--green-dim)">
          🏃 W${nextRun.w} ${nextRun.label}
        </a>
      </div>`;
  } else {
    el.innerHTML = `
      <a href="running.html" class="next-card" style="background:${nextRun.bg};border-color:${nextRun.border};text-decoration:none;color:inherit">
        <div class="next-label" style="color:${nextRun.accent}">Running · Week ${nextRun.w}</div>
        <div class="next-title">${nextRun.label}</div>
        <div class="next-detail">${nextRun.detail}</div>
        <div class="next-cta" style="border:1px solid ${nextRun.border}">
          <span class="next-cta-text" style="color:${nextRun.accent}">Log this run →</span>
          <span class="next-cta-arrow">🏃</span>
        </div>
      </a>
      <div class="or-pill">
        <span class="or-label">Or:</span>
        <a href="rumble.html" class="or-btn" style="color:var(--orange);border-color:#3d2200;background:#1a0e00">
          🥊 Start boxing session
        </a>
      </div>`;
  }
}

// ── THIS WEEK ─────────────────────────────────
function renderWeek() {
  const runs = getRuns();
  const boxing = getBoxing();
  const dow = now.getDay();
  const mon = new Date(now); mon.setDate(now.getDate() - ((dow+6)%7));
  const monStr = mon.toISOString().split('T')[0];
  const nowStr = now.toISOString().split('T')[0];

  // Runs this week
  const weekRuns = runs.filter(r => r.date >= monStr && r.date <= nowStr);
  const runKm = weekRuns.reduce((a,r) => a + (r.distance||0), 0);
  document.getElementById('week-run-sub').textContent =
    `${weekRuns.length} run${weekRuns.length !== 1 ? 's' : ''} · ${runKm.toFixed(1)}km`;

  // Boxing this week
  const weekBox = boxing.filter(b => {
    const d = boxDate(b);
    return d >= monStr && d <= nowStr;
  });
  document.getElementById('week-box-sub').textContent =
    `${weekBox.length} session${weekBox.length !== 1 ? 's' : ''}`;

  // Dots — run
  const runDots = document.getElementById('week-run-dots');
  runDots.innerHTML = Array.from({length: RUN_WEEK_TARGET}, (_,i) =>
    `<div class="dot ${i < weekRuns.length ? 'done-run' : ''}"></div>`
  ).join('');

  // Dots — boxing
  const boxDots = document.getElementById('week-box-dots');
  boxDots.innerHTML = Array.from({length: BOX_WEEK_TARGET}, (_,i) =>
    `<div class="dot ${i < weekBox.length ? 'done-box' : ''}"></div>`
  ).join('');
}

// ── RECENT HISTORY ────────────────────────────
function renderRecentHistory() {
  const el = document.getElementById('recent-history-el');
  const runs = getRuns();
  const boxing = getBoxing();

  // Combine and sort newest first
  const items = [
    ...runs.map(r => ({ type:'run', date: r.date||'', data: r })),
    ...boxing.map(b => ({ type:'box', date: boxDate(b), data: b }))
  ].filter(i => i.date).sort((a,b) => b.date.localeCompare(a.date)).slice(0,5);

  if (!items.length) {
    el.innerHTML = `<div class="hist-empty">No sessions yet — get started above</div>`;
    return;
  }

  el.innerHTML = items.map(item => {
    if (item.type === 'run') {
      const r = item.data;
      const badge = r.distance ? `${r.distance}km` : '';
      const meta = [fmtDate(r.date), r.avgPace ? r.avgPace+'/km' : '', r.time||''].filter(Boolean).join(' · ');
      return `<a href="running.html" class="hist-item">
        <div class="hist-icon">🏃</div>
        <div class="hist-body">
          <div class="hist-name">${r.name || 'Run'}</div>
          <div class="hist-meta">${meta}</div>
        </div>
        ${badge ? `<div class="hist-badge" style="color:var(--green);background:var(--green-dim);border:1px solid var(--green-border)">${badge}</div>` : ''}
      </a>`;
    } else {
      const b = item.data;
      const type = b.title || b.type || b.sessionType || 'Boxing Session';
      const badge = b.duration ? `${b.duration}min` : b.rounds ? `${b.rounds}r` : '';
      const meta = [fmtDate(item.date), b.rounds ? b.rounds+' rounds' : ''].filter(Boolean).join(' · ');
      return `<a href="rumble.html" class="hist-item">
        <div class="hist-icon">🥊</div>
        <div class="hist-body">
          <div class="hist-name">${type}</div>
          <div class="hist-meta">${meta}</div>
        </div>
        ${badge ? `<div class="hist-badge" style="color:var(--orange);background:#1a0e00;border:1px solid #3d2200">${badge}</div>` : ''}
      </a>`;
    }
  }).join('');
}

// ── INIT ──────────────────────────────────────
renderLastSession();
renderNextSession();
renderWeek();
renderRecentHistory();
</script>
</body>
</html>
